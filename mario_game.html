const rHit=(ax,ay,aw,ah,bx,by,bw,bh)=>ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
function onSolidGround(px,py,pw,ph){
  // Use center of player for gap detection — feels fair
  const cx = px + pw/2;
  for(const g of gaps) if(cx > g.x && cx < g.x+g.w && py+ph>=GY && py+ph<=GY+20) return false;
  return py+ph>=GY&&py+ph<=GY+20;
}
function burst(x,y,col,n=6){
  for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2,sp=2+Math.random()*2;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:28,col});}
}

function update(){
  if(!visible||gameOver||won||!gameStarted) return;
  if(!P.alive){P.vy+=0.9;P.y+=P.vy;return;}
  tick++;
  if(tick%60===0&&gameStarted){timeLeft=Math.max(0,timeLeft-1);if(!timeLeft){killPlayer();return;}document.getElementById('ti').textContent=String(timeLeft).padStart(3,'0');}

  const left=keys['ArrowLeft']||keys['KeyA'],right=keys['ArrowRight']||keys['KeyD'];
  if(left){P.vx=-4;P.facing=-1;}else if(right){P.vx=4;P.facing=1;}else P.vx*=0.7;
  if(Math.abs(P.vx)<0.1) P.vx=0;
  P.vy=Math.min(P.vy+0.78,16);

  P.x+=P.vx;
  P.x=Math.max(0,Math.min(P.x,WORLD_W-P.w));
  for(const p of platforms){
    if(p.t==='S') continue;
    if(!rHit(P.x,P.y,P.w,P.h,p.x,p.y,p.w,p.h)) continue;
    P.x=P.vx>0?p.x-P.w:p.x+p.w; P.vx=0;
  }
  for(const p of pipes){
    const py2=GY-p.h;
    if(!rHit(P.x,P.y,P.w,P.h,p.x,py2,48,p.h)) continue;
    P.x=P.vx>0?p.x-P.w:p.x+48; P.vx=0;
  }

  P.y+=P.vy; P.onGround=false;
  if(onSolidGround(P.x,P.y,P.w,P.h)){P.y=GY-P.h;P.vy=0;P.onGround=true;}
  if(P.y>GY+120){killPlayer();return;}

  for(const p of platforms){
    if(!rHit(P.x,P.y,P.w,P.h,p.x,p.y,p.w,p.h)) continue;
    const prevB=P.y+P.h-P.vy,prevT=P.y-P.vy;
    if(P.vy>0&&prevB<=p.y+6){P.y=p.y-P.h;P.vy=0;P.onGround=true;}
    else if(P.vy<0&&prevT>=p.y+p.h-6){
      P.y=p.y+p.h;P.vy=2;
      if((p.t==='?'||p.t==='I')&&!p.hit){
        p.hit=true;
        if(p.t==='?'&&p.coin){coins=Math.min(99,coins+1);score+=200;coinPops.push({x:p.x+p.w/2,y:p.y,vy:-7,life:50});burst(p.x+p.w/2,p.y,'#FCFC00');}
        else if(p.t==='I') burst(p.x+p.w/2,p.y,'#FCFC00');
        document.getElementById('co').textContent=String(coins).padStart(2,'0');
      } else if(p.t==='B') burst(p.x+p.w/2,p.y,C.brick);
    }
  }
  for(const p of pipes){
    const py2=GY-p.h;
    if(!rHit(P.x,P.y,P.w,P.h,p.x,py2,48,p.h)) continue;
    const prevB=P.y+P.h-P.vy;
    if(P.vy>0&&prevB<=py2+6){P.y=py2-P.h;P.vy=0;P.onGround=true;}
  }

  if(P.inv>0) P.inv--;
  for(const e of enemies){
    if(!e.alive) continue;
    if(e.squish){if(--e.st<=0)e.alive=false;continue;}
    e.wt++;

    // Check if moving in current direction would step over a gap — turn around
    const nextX = e.x + e.vx;
    const frontX = e.vx > 0 ? nextX + e.w : nextX;
    let wouldFall = false;
    // Check gap ahead at foot level (lookahead = 8px beyond front edge)
    const lookX = e.vx > 0 ? e.x + e.w + 8 : e.x - 8;
    for(const g of gaps){
      if(lookX > g.x && lookX < g.x + g.w){
        wouldFall = true; break;
      }
    }
    if(wouldFall){ e.vx = -e.vx; }
    else { e.x += e.vx; }

    // World bounds
    if(e.x < 0){ e.x=0; e.vx=Math.abs(e.vx); }

    // Turn around at pipes
    for(const p of pipes){
      if(e.x+e.w > p.x && e.x < p.x+48 && e.y+e.h > GY-p.h){
        e.vx = -e.vx;
        e.x += e.vx*2;
      }
    }

    // Simple gravity — enemies stay on ground, fall into gaps
    e.vy = (e.vy||0) + 0.8;
    e.y += e.vy;
    // Check if on solid ground
    let onG = false;
    let inGap = false;
    for(const g of gaps) if(e.x+e.w>g.x && e.x<g.x+g.w) { inGap=true; break; }
    if(!inGap && e.y+e.h >= GY){ e.y=GY-e.h; e.vy=0; onG=true; }
    // Remove if fallen off
    if(e.y > H+80){ e.alive=false; continue; }

    if(P.inv===0&&rHit(P.x,P.y,P.w,P.h,e.x,e.y,e.w,e.h)){
      const prevB=P.y+P.h-P.vy;
      if(P.vy>0&&prevB<e.y+e.h*0.6){e.squish=true;e.st=20;P.vy=-10;score+=100;burst(e.x+e.w/2,e.y,C.gBrown);}
      else if(P.inv===0){killPlayer();return;}
    }
  }

  // Animate plants + collision
  plants.forEach(pl=>{
    pl.phase=(pl.phase+0.02)%1;
    if(!P.alive||P.inv>0) return;
    const pipe=pipes[pl.pipeIdx];
    if(!pipe) return;
    const pw=48;
    const bob=Math.sin(pl.phase*Math.PI*2)*12;
    const pipeTopY=GY-pipe.h;
    // Plant hitbox: centered in pipe, 24px wide, 30px tall
    const plantX=pipe.x+pw/2-12;
    const plantY=pipeTopY-30+bob;
    if(rHit(P.x,P.y,P.w,P.h, plantX,plantY,24,30)){
      killPlayer();
    }
  });

  if(P.x+P.w>flagPole.x) triggerWin();
  camX=Math.max(0,Math.min(P.x-280,4000-W));

  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.4;p.life--;if(p.life<=0)particles.splice(i,1);}
  for(let i=coinPops.length-1;i>=0;i--){const c=coinPops[i];c.y+=c.vy;c.vy+=0.4;c.life--;if(c.life<=0)coinPops.splice(i,1);}
  if(P.vx!==0&&P.onGround){if(++P.frameT>6){P.frame=(P.frame+1)%4;P.frameT=0;}}
  else P.frame=0;
  document.getElementById('sc').textContent=String(score).padStart(6,'0');
}

function killPlayer(){if(!P.alive)return;P.alive=false;P.vy=-14;bgm.pause();bgm.currentTime=0;setTimeout(()=>{const m=document.getElementById('msg');m.innerHTML='GAME OVER<br><br><small style="font-size:10px">Press R to restart</small>';m.style.display='block';gameOver=true;},1300);}
function triggerWin(){if(won)return;won=true;score+=timeLeft*50;bgm.pause();bgm.currentTime=0;setTimeout(()=>{const m=document.getElementById('msg');m.innerHTML='&#127881; LEVEL CLEAR! &#127881;<br><br>SCORE: '+String(score).padStart(6,'0')+'<br><br><small style="font-size:10px">Press R to restart</small>';m.style.display='block';},700);}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function nesCloud(cx,cy){
  const u=4;
  [[0,3,10,1],[0,2,10,1],[1,1,8,1],[2,0,2,1],[5,0,2,1],[3,-1,3,1]].forEach(([rx,ry,rw,rh])=>{
    ctx.fillStyle=C.white; ctx.fillRect(cx+rx*u,cy+ry*u,rw*u,rh*u);
  });
}

function nesHill(hx){
  const sx=hx-camX;
  if(sx<-180||sx>W+20) return;
  ctx.fillStyle='#00A800';
  ctx.fillRect(sx,GY-16,96,16); ctx.fillRect(sx+8,GY-32,80,16);
  ctx.fillRect(sx+16,GY-48,64,16); ctx.fillRect(sx+32,GY-64,32,16);
  ctx.fillStyle='#00CC00'; ctx.fillRect(sx+32,GY-64,32,6); ctx.fillRect(sx+16,GY-48,64,6);
}

function nesBush(bx){
  const sx=bx-camX;
  if(sx<-100||sx>W+10) return;
  ctx.fillStyle='#00A800';
  ctx.fillRect(sx,GY-16,64,16); ctx.fillRect(sx+8,GY-32,48,16); ctx.fillRect(sx+16,GY-40,32,8);
  ctx.fillStyle='#00CC00'; ctx.fillRect(sx+16,GY-40,32,4); ctx.fillRect(sx+8,GY-32,48,4);
}

function drawGround(){
  const T=16;
  let gx=Math.floor((camX-T)/T)*T;
  while(gx<camX+W+T){
    let inGap=false;
    for(const g of gaps) if(gx>=g.x&&gx<g.x+g.w){inGap=true;break;}
    const sx=gx-camX;
    if(!inGap){
      ctx.fillStyle=C.brickLt; ctx.fillRect(sx,GY,T,T);
      ctx.fillStyle=C.brick; ctx.fillRect(sx,GY,T/2,T/2); ctx.fillRect(sx+T/2,GY+T/2,T/2,T/2);
      ctx.fillStyle=C.brickDk; ctx.fillRect(sx,GY+T-2,T,2); ctx.fillRect(sx+T-2,GY,2,T);
      for(let row=1;row<(H-GY)/T+1;row++){
        const sy=GY+row*T;
        ctx.fillStyle=C.brick; ctx.fillRect(sx,sy,T,T);
        ctx.fillStyle=C.brickDk; ctx.fillRect(sx,sy,T,1); ctx.fillRect(sx,sy,1,T);
        ctx.fillStyle=C.brickLt; ctx.fillRect(sx+1,sy+1,T/2-1,T/2-1); ctx.fillRect(sx+T/2+1,sy+T/2+1,T/2-2,T/2-2);
      }
    }
    gx+=T;
  }
}

function drawBrick(sx,sy,w,h){
  const T=16;
  for(let ty=sy;ty<sy+h;ty+=T){
    for(let tx=sx;tx<sx+w;tx+=T){
      ctx.fillStyle=C.brick; ctx.fillRect(tx,ty,T,T);
      ctx.fillStyle=C.brickLt; ctx.fillRect(tx+1,ty+1,T/2-1,T/2-1); ctx.fillRect(tx+T/2+1,ty+T/2+1,T/2-2,T/2-2);
      ctx.fillStyle=C.brickDk;
      ctx.fillRect(tx,ty,T,1); ctx.fillRect(tx,ty,1,T); ctx.fillRect(tx,ty+T-1,T,1); ctx.fillRect(tx+T-1,ty,1,T);
    }
  }
}

function drawQuestion(sx,sy,w,h,hit){
  if(hit){
    ctx.fillStyle=C.qHit; ctx.fillRect(sx,sy,w,h);
    ctx.fillStyle='#A07848'; ctx.fillRect(sx+4,sy+4,w-8,h-8);
    ctx.fillStyle=C.brickDk; ctx.fillRect(sx,sy,w,2); ctx.fillRect(sx,sy+h-2,w,2); ctx.fillRect(sx,sy,2,h); ctx.fillRect(sx+w-2,sy,2,h);
    return;
  }
  const flash=Math.floor(Date.now()/200)%4;
  const col=flash===0?C.qLight:(flash===2?'#F8C800':C.qBlock);
  ctx.fillStyle=col; ctx.fillRect(sx,sy,w,h);
  ctx.fillStyle=C.qDark; ctx.fillRect(sx,sy,w,2); ctx.fillRect(sx,sy+h-2,w,2); ctx.fillRect(sx,sy,2,h); ctx.fillRect(sx+w-2,sy,2,h);
  ctx.fillStyle=C.qLight; ctx.fillRect(sx+2,sy+2,w-4,2); ctx.fillRect(sx+2,sy+2,2,h-4);
  const qx=sx+w/2-5,qy=sy+h/2-7;
  ctx.fillStyle=C.white;
  [[1,0,2],[0,1,4],[0,2,4],[1,3,2],[1,4,2],[1,6,2]].forEach(([rx,ry,rw])=>ctx.fillRect(qx+rx*2,qy+ry*2,rw*2,2));
}

function drawIconBlock(sx,sy,w,h,iconKey,hit){
  if(hit){
    // Hit: just draw as a brick block — icon is gone
    drawBrick(sx,sy,w,h);
    return;
  }
  // Not hit: draw icon as cover fill
  const iconImg = iconImgs[iconKey];
  if(iconImg && iconImg.complete && iconImg.naturalWidth>0){
    ctx.save();
    ctx.beginPath(); ctx.rect(sx,sy,w,h); ctx.clip();
    const iw=iconImg.naturalWidth, ih=iconImg.naturalHeight;
    const scale=Math.max(w/iw, h/ih);
    const dw=iw*scale, dh=ih*scale;
    const dx=sx+(w-dw)/2, dy=sy+(h-dh)/2;
    ctx.drawImage(iconImg,dx,dy,dw,dh);
    ctx.restore();
  } else {
    ctx.fillStyle='#E07800'; ctx.fillRect(sx,sy,w,h);
  }
  // Subtle border
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.fillRect(sx,sy,w,2); ctx.fillRect(sx,sy+h-2,w,2);
  ctx.fillRect(sx,sy,2,h); ctx.fillRect(sx+w-2,sy,2,h);
}

function drawPipeBody(px,pH){
  const sx=px-camX,pw=48,py=GY-pH;
  if(sx>-80&&sx<W+10){
    ctx.fillStyle=C.pipe1; ctx.fillRect(sx+6,py+32,pw-12,pH-32);
    ctx.fillStyle=C.pipe2; ctx.fillRect(sx+10,py+32,8,pH-32);
    ctx.fillStyle=C.pipeDk; ctx.fillRect(sx+pw-10,py+32,4,pH-32);
    ctx.fillStyle=C.pipeDk; ctx.fillRect(sx+6,py+32,2,pH-32);
  }
}
function drawPipeRim(px,pH){
  const sx=px-camX,pw=48,py=GY-pH;
  if(sx>-80&&sx<W+10){
    ctx.fillStyle=C.pipe1; ctx.fillRect(sx,py,pw,32);
    ctx.fillStyle=C.pipe2; ctx.fillRect(sx+4,py+3,12,26);
    ctx.fillStyle=C.pipeDk;
    ctx.fillRect(sx+pw-8,py,8,32);
    ctx.fillRect(sx,py,pw,2);
    ctx.fillRect(sx,py+30,pw,2);
  }
}

function drawPlant(pipeIdx,phase){
  const pipe=pipes[pipeIdx];
  if(!pipe) return;
  const sx=pipe.x-camX, pw=48;
  const pipeTopY=GY-pipe.h;
  // plant bob up/down from pipe top
  const bob=Math.sin(phase*Math.PI*2)*12;
  const plantY=pipeTopY-36+bob;
  // draw using the plant image
  const img=iconImgs.plant;
  if(img&&img.complete&&img.naturalWidth>0){
    ctx.drawImage(img, sx+pw/2-12, plantY, 24, 30);
  } else {
    // fallback
    ctx.fillStyle='#00A800'; ctx.fillRect(sx+pw/2-4,plantY,8,36);
    ctx.fillStyle='#00CC00'; ctx.fillRect(sx+pw/2-12,plantY,18,14);
  }
}

function drawStair(sx,sy,w,h){
  const T=16;
  for(let ty=sy;ty<sy+h;ty+=T){
    for(let tx=sx;tx<sx+w;tx+=T){
      ctx.fillStyle=C.brick; ctx.fillRect(tx,ty,T,T);
      ctx.fillStyle=C.brickDk; ctx.fillRect(tx,ty,T,1); ctx.fillRect(tx,ty,1,T); ctx.fillRect(tx,ty+T-1,T,1); ctx.fillRect(tx+T-1,ty,1,T);
      ctx.fillStyle=C.brickLt; ctx.fillRect(tx+2,ty+2,4,4);
    }
  }
}

function drawGoomba(e){
  if(!e.alive) return;
  const sx=Math.floor(e.x-camX),sy=e.y;
  if(sx<-50||sx>W+10) return;
  ctx.save();
  if(e.squish){

  ctx.fillRect(sx+4,sy,e.w-8,e.h*0.55); ctx.fillRect(sx+2,sy+4,e.w-4,e.h*0.4);
  ctx.fillStyle=C.gBrown; ctx.fillRect(sx+4,sy+4,e.w-8,e.h*0.5);
  ctx.fillStyle='#E09050'; ctx.fillRect(sx+8,sy+e.h*0.45,e.w-16,e.h*0.3);

  ctx.fillStyle=C.black; ctx.fillRect(sx+8,sy+8,4,4); ctx.fillRect(sx+e.w-12,sy+8,4,4);
  ctx.fillStyle=C.gDark; ctx.fillRect(sx+2,sy+4,8,2); ctx.fillRect(sx+e.w-10,sy+4,8,2);
  ctx.fillStyle=C.white; ctx.fillRect(sx+4,sy+e.h*0.55,5,4); ctx.fillRect(sx+e.w-9,sy+e.h*0.55,5,4);
  ctx.fillStyle=C.gDark; ctx.fillRect(sx+9,sy+e.h*0.55,2,4); ctx.fillRect(sx+e.w-13,sy+e.h*0.55,2,4);
  ctx.restore();
}

// NES Mario — exact pixel art sprite, 2px per NES pixel
// Based on authentic Super Mario Bros NES sprite sheet
function drawMario(){
  const ox=Math.floor(P.x-camX), oy=Math.floor(P.y);
  if(!P.alive&&oy>H+60) return;
  const S=3; // 3px per NES pixel → sprite is ~36×48px

  // NES colors
  const R=C.mHat, Sk=C.mSkin, Bl=C.mOver, Br=C.mBrown, Bk=C.black, Sh=C.mShoe;

  // Pixel map: each entry = [color, x, y, w, h] in NES pixels
  // Sprite is 12 wide × 16 tall NES pixels
  // Standing pose (facing right, profile with face slightly turned)
  const stand=[
    // Hat
    [R, 3,0, 6,1],[R, 2,1, 8,1],
    [Br,0,2, 3,1],[R, 3,2, 8,1],
    // Face
    [Sk,2,3, 8,1],
    [Sk,2,4, 4,1],[Bk,6,4,2,1],[Sk,8,4,2,1],
    [Sk,1,5,10,1],
    [Sk,3,6, 2,1],[Br,5,6,1,1],[Sk,6,6,2,1],
    [Br,3,7, 6,1],
    // Body: red shirt, blue overalls
    [R, 2,8, 8,1],[Bl,4,8,4,1],
    [R, 1,9,10,1],[Bl,4,9,5,1],
    [R, 1,10,10,1],[Bl,3,10,7,1],
    // Arms
    [Sk,0,9, 2,1],[Sk,10,9,2,1],
    // Overalls lower
    [Bl,1,11,5,1],[Bl,7,11,4,1],
    [Bl,1,12,4,1],[Bl,7,12,4,1],
    // Legs + shoes
    [Bl,2,13,3,1],[Bl,7,13,3,1],
    [Sh,1,14,4,1],[Sh,7,14,4,1],
    [Sh,0,15,5,1],[Sh,7,15,5,1],
  ];

  const walkA=[
    [R, 3,0, 6,1],[R, 2,1, 8,1],[Br,0,2,3,1],[R,3,2,8,1],
    [Sk,2,3,8,1],[Sk,2,4,4,1],[Bk,6,4,2,1],[Sk,8,4,2,1],
    [Sk,1,5,10,1],[Sk,3,6,2,1],[Br,5,6,1,1],[Sk,6,6,2,1],[Br,3,7,6,1],
    [R,2,8,8,1],[Bl,4,8,4,1],[R,1,9,10,1],[Bl,4,9,5,1],[R,1,10,10,1],[Bl,3,10,7,1],
    [Sk,11,9,1,1],// front hand
    [Bl,0,11,5,1],[Bl,7,11,5,1],
    [Bl,0,12,4,1],[Bl,8,12,4,1],
    [Sh,0,13,4,1],[Sh,8,13,4,1],
    [Sh,0,14,5,1],[Sh,8,14,4,1],
    [Sh,1,15,3,1],[Sh,9,15,3,1],
  ];

  const walkB=[
    [R, 3,0, 6,1],[R, 2,1, 8,1],[Br,0,2,3,1],[R,3,2,8,1],
    [Sk,2,3,8,1],[Sk,2,4,4,1],[Bk,6,4,2,1],[Sk,8,4,2,1],
    [Sk,1,5,10,1],[Sk,3,6,2,1],[Br,5,6,1,1],[Sk,6,6,2,1],[Br,3,7,6,1],
    [R,2,8,8,1],[Bl,4,8,4,1],[R,1,9,10,1],[Bl,4,9,5,1],[R,1,10,10,1],[Bl,3,10,7,1],
    [Sk,0,10,1,1],// back hand
    [Bl,2,11,4,1],[Bl,8,11,4,1],
    [Bl,2,12,4,1],[Bl,8,12,4,1],
    [Bl,3,13,3,1],[Bl,9,13,3,1],
    [Sh,2,14,4,1],[Sh,8,14,4,1],
    [Sh,1,15,4,1],[Sh,8,15,4,1],
  ];

  const jumpF=[
    [R, 3,0, 6,1],[R, 2,1, 8,1],[Br,0,2,3,1],[R,3,2,8,1],
    [Sk,2,3,8,1],[Sk,2,4,4,1],[Bk,6,4,2,1],[Sk,8,4,2,1],
    [Sk,1,5,10,1],[Sk,3,6,2,1],[Br,5,6,1,1],[Sk,6,6,2,1],[Br,3,7,6,1],
    // arms up
    [Sk,0,7,2,1],[R,2,8,8,1],[Bl,4,8,4,1],[Sk,10,7,2,1],
    [R,1,9,10,1],[Bl,4,9,5,1],[R,0,10,12,1],[Bl,3,10,7,1],
    [Bl,1,11,10,1],
    // legs bent
    [Bl,2,12,3,1],[Bl,8,12,3,1],
    [Sh,1,13,4,1],[Sh,8,13,4,1],
    [Sh,0,14,5,1],[Sh,7,14,5,1],
  ];

  const frame = !P.onGround ? jumpF : (P.vx===0 ? stand : (P.frame%2===0 ? walkA : walkB));

  ctx.save();
  // Offset so sprite center aligns with hitbox center
  const offX = Math.floor((P.w - 12*S)/2);
  if(P.facing<0){
    const cx=ox+offX+6*S; ctx.translate(cx,0); ctx.scale(-1,1); ctx.translate(-cx,0);
  }
  frame.forEach(([col,px,py2,pw,ph])=>{
    ctx.fillStyle=col;
    ctx.fillRect(ox+offX+px*S, oy+py2*S, pw*S, ph*S);
  });
  ctx.restore();
}

function drawFlag(){
  const sx=flagPole.x-camX;
  if(sx<-30||sx>W+10) return;
  ctx.fillStyle='#BCBCBC'; ctx.fillRect(sx+3,flagPole.y,4,flagPole.h);
  ctx.fillStyle=C.white; ctx.fillRect(sx+4,flagPole.y,2,flagPole.h);
  ctx.fillStyle=C.pipe1; ctx.fillRect(sx+7,flagPole.y,32,20);
  ctx.fillStyle=C.pipe2; ctx.fillRect(sx+7,flagPole.y,32,8);
  ctx.fillStyle='#FCFC00'; ctx.fillRect(sx,flagPole.y-4,10,8);
  ctx.fillStyle=C.white; ctx.fillRect(sx+2,flagPole.y-2,6,4);
}

function drawCastle(){
  const cx = 3620 - camX;
  if(cx > W+10 || cx < -300) return;
  const B = 32; // block size
  const base = GY; // ground level

  // Castle is ~6 blocks wide, ~5 blocks tall
  // Colors: brick brown for walls, darker for windows/door
  const wall = C.brick;
  const wallLt = C.brickLt;
  const wallDk = C.brickDk;
  const dark = '#3C1800';
  const battlementH = B*0.6|0;

  // Draw castle body — 6 cols × 5 rows of brick
  const cw = B*6, ch = B*5;
  const bx = cx, by = base - ch;

  // Main wall
  ctx.fillStyle=wall; ctx.fillRect(bx, by, cw, ch);
  // Brick texture
  for(let row=0;row<5;row++){
    for(let col=0;col<6;col++){
      const tx=bx+col*B, ty=by+row*B;
      ctx.fillStyle=wallLt; ctx.fillRect(tx+2,ty+2,B/2-2,B/2-2); ctx.fillRect(tx+B/2+2,ty+B/2+2,B/2-4,B/2-4);
      ctx.fillStyle=wallDk; ctx.fillRect(tx,ty,B,1); ctx.fillRect(tx,ty,1,B); ctx.fillRect(tx,ty+B-1,B,1); ctx.fillRect(tx+B-1,ty,1,B);
    }
  }

  // Battlements (top crenellations) — 4 merlons with gaps
  for(let i=0;i<6;i++){
    if(i%2===0){
      ctx.fillStyle=wall; ctx.fillRect(bx+i*B, by-battlementH, B, battlementH);
      for(let c=0;c<1;c++){
        ctx.fillStyle=wallLt; ctx.fillRect(bx+i*B+2,by-battlementH+2,B/2-2,B/2-2);
        ctx.fillStyle=wallDk; ctx.fillRect(bx+i*B,by-battlementH,B,1); ctx.fillRect(bx+i*B,by-battlementH,1,battlementH);
      }
    }
  }

  // Two tower bumps on top corners
  const tw=B*2, th=B*3;
  // Left tower
  ctx.fillStyle=wall; ctx.fillRect(bx-B, by-th, tw, th+ch);
  for(let row=0;row<(th+ch)/B;row++){
    for(let col=0;col<2;col++){
      const tx=bx-B+col*B, ty=by-th+row*B;
      ctx.fillStyle=wallLt; ctx.fillRect(tx+2,ty+2,B/2-2,B/2-2); ctx.fillRect(tx+B/2+2,ty+B/2+2,B/2-4,B/2-4);
      ctx.fillStyle=wallDk; ctx.fillRect(tx,ty,B,1); ctx.fillRect(tx,ty,1,B);
    }
  }
  // Left tower battlements
  for(let i=0;i<2;i++){
    if(i%2===0){ ctx.fillStyle=wall; ctx.fillRect(bx-B+i*B, by-th-battlementH, B, battlementH); }
  }

  // Right tower
  ctx.fillStyle=wall; ctx.fillRect(bx+cw-B, by-th, tw, th+ch);
  for(let row=0;row<(th+ch)/B;row++){
    for(let col=0;col<2;col++){
      const tx=bx+cw-B+col*B, ty=by-th+row*B;
      ctx.fillStyle=wallLt; ctx.fillRect(tx+2,ty+2,B/2-2,B/2-2); ctx.fillRect(tx+B/2+2,ty+B/2+2,B/2-4,B/2-4);
      ctx.fillStyle=wallDk; ctx.fillRect(tx,ty,B,1); ctx.fillRect(tx,ty,1,B);
    }
  }
  // Right tower battlements
  for(let i=0;i<2;i++){
    if(i%2===0){ ctx.fillStyle=wall; ctx.fillRect(bx+cw-B+i*B, by-th-battlementH, B, battlementH); }
  }

  // Windows — two small dark squares
  ctx.fillStyle=dark;
  ctx.fillRect(bx+B,    by+B,   B, B*1.5|0);
  ctx.fillRect(bx+cw-B*2, by+B, B, B*1.5|0);
  // Window ledges
  ctx.fillStyle=wallDk;
  ctx.fillRect(bx+B-2,    by+B*2.5|0, B+4, 3);
  ctx.fillRect(bx+cw-B*2-2, by+B*2.5|0, B+4, 3);

  // Door — arched dark opening in center
  const dx=bx+cw/2-B/2, dy=by+ch-B*2;
  ctx.fillStyle=dark; ctx.fillRect(dx, dy, B, B*2);
  // Arch top
  ctx.fillRect(dx-4, dy, 4, B*2);
  ctx.fillRect(dx+B, dy, 4, B*2);
  ctx.fillRect(dx-4, dy-8, B+8, 12);
  // Door highlight
  ctx.fillStyle='#280C00';
  ctx.fillRect(dx+2, dy, 4, B*1.8|0);

  // Flag on castle
  ctx.fillStyle='#BCBCBC'; ctx.fillRect(bx+cw/2+2, by-th-16, 3, 20);
  ctx.fillStyle=C.pipe1;   ctx.fillRect(bx+cw/2+5, by-th-16, 14, 10);
}

function render(){
  ctx.fillStyle=C.sky; ctx.fillRect(0,0,W,H);
  hills.forEach(h=>nesHill(h.x));
  clouds.forEach(c=>nesCloud(c.x-Math.floor(camX*0.3),c.y));
  bushes.forEach(b=>nesBush(b.x));
  drawGround();

  for(const p of platforms){
    const sx=p.x-camX;
    if(sx<-80||sx>W+80) continue;
    if(p.t==='B'||p.t==='S') drawBrick(sx,p.y,p.w,p.h);
    else if(p.t==='?') drawQuestion(sx,p.y,p.w,p.h,p.hit);
    else if(p.t==='I') drawIconBlock(sx,p.y,p.w,p.h,p.icon,p.hit);
  }

  // 1. Pipe bodies (behind plant)
  pipes.forEach(p=>drawPipeBody(p.x,p.h));
  // 2. Plants (inside the pipe opening, behind rim)
  plants.forEach(pl=>drawPlant(pl.pipeIdx,pl.phase));
  // 3. Pipe rims (drawn ON TOP of plant so it looks like it's coming out)
  pipes.forEach(p=>drawPipeRim(p.x,p.h));

  drawCastle();
  drawFlag();
  enemies.forEach(e=>drawGoomba(e));

  coinPops.forEach(c=>{
    ctx.save();ctx.globalAlpha=c.life/50;
    ctx.fillStyle='#FCFC00'; const cx=c.x-camX,cy=c.y;
    ctx.fillRect(cx-6,cy-6,12,12); ctx.fillStyle='#F8B800'; ctx.fillRect(cx-4,cy-4,8,8);
    ctx.restore();
  });
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life/28;ctx.fillStyle=p.col;ctx.fillRect(p.x-camX-3,p.y-3,6,6);ctx.restore();
  });

  drawMario();
  if(!P.alive||gameOver||won){ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,W,H);}
}

document.getElementById('startBtn').addEventListener('click',()=>{
  gameStarted=true;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('c').focus();
  bgm.play().catch(()=>{});
});







function loop(){update();render();requestAnimationFrame(loop);}
loop();
</script>
